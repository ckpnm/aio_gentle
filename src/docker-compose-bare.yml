services:
  remnanode:
    container_name: remnanode
    hostname: remnanode
    image: remnawave/node:2.7.0
    network_mode: host
    restart: always
    cap_add:
      - NET_ADMIN
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    environment:
      - NODE_PORT=2222
      - SECRET_KEY=#SECRET_KEY#
    volumes:
      - '/var/log/xray:/var/log/xray'
      - /etc/letsencrypt:/etc/letsencrypt:ro
